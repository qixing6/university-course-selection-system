<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>课程管理中心</title>
    <script src="https://cdn.bootcdn.net/ajax/libs/axios/0.27.2/axios.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: "Microsoft Yahei", sans-serif; }
        body { background: #f0f2f5; padding: 20px; }
        .container { max-width: 1000px; margin: 0 auto; background: white; padding: 30px; border-radius: 12px; box-shadow: 0 2px 12px rgba(0,0,0,0.1); }
        h1 { color: #2c3e50; margin-bottom: 30px; display: flex; align-items: center; gap: 10px; }
        .back-btn { padding: 8px 16px; background: #909399; color: white; border: none; border-radius: 6px; cursor: pointer; margin-bottom: 20px; transition: all 0.3s; }
        .back-btn:hover { background: #82848a; transform: translateY(-1px); }
        .menu-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 20px;
            margin-top: 20px;
        }
        .menu-card {
            border: 1px solid #ebeef5;
            border-radius: 12px;
            padding: 30px 20px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s;
            background: white;
        }
        .menu-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 8px 20px rgba(0,0,0,0.1);
            border-color: #409eff;
        }
        .menu-icon { font-size: 40px; margin-bottom: 15px; }
        .menu-title { font-size: 18px; font-weight: 500; color: #2c3e50; margin-bottom: 10px; }
        .menu-desc { font-size: 14px; color: #909399; line-height: 1.5; }
        /* 卡片配色 */
        .card-add { border-top: 4px solid #409eff; }
        .card-edit { border-top: 4px solid #67c23a; }
        .card-delete { border-top: 4px solid #f56c6c; }
        .card-detail { border-top: 4px solid #e6a23c; }
        .card-cache { border-top: 4px solid #722ed1; }
        .card-query { border-top: 4px solid #13c2c2; }
    </style>
</head>
<body>
<div class="container">
    <h1>🎛️ 课程管理中心</h1>
    <button class="back-btn" onclick="location.href='course.html'">← 返回系统首页</button>

    <div class="menu-grid">
        <div class="menu-card card-add" onclick="location.href='course-add.html'">
            <div class="menu-icon">➕</div>
            <div class="menu-title">新增课程</div>
            <div class="menu-desc">创建新的课程，填写课程信息</div>
        </div>

        <div class="menu-card card-edit" onclick="location.href='course-edit.html'">
            <div class="menu-icon">✏️</div>
            <div class="menu-title">编辑课程</div>
            <div class="menu-desc">修改已有课程的信息</div>
        </div>

        <div class="menu-card card-delete" onclick="location.href='course-delete.html'">
            <div class="menu-icon">🗑️</div>
            <div class="menu-title">删除课程</div>
            <div class="menu-desc">删除不需要的课程（不可逆）</div>
        </div>

        <div class="menu-card card-detail" onclick="location.href='course-detail.html'">
            <div class="menu-icon">🔍</div>
            <div class="menu-title">课程详情</div>
            <div class="menu-desc">查询课程的详细信息</div>
        </div>

        <div class="menu-card card-cache" onclick="location.href='course-cache.html'">
            <div class="menu-icon">⚡</div>
            <div class="menu-title">缓存预热</div>
            <div class="menu-desc">预热热点课程缓存，提升性能</div>
        </div>

        <div class="menu-card card-query" onclick="location.href='course-query.html'">
            <div class="menu-icon">📖</div>
            <div class="menu-title">课程查询</div>
            <div class="menu-desc">查看所有课程列表</div>
        </div>
    </div>
</div>
<script>
    const baseURL = window.location.protocol + '//' + window.location.host + '/api';
    async function ensureLoggedIn() {
        try {
            await axios.get(`${baseURL}/student/auth/me`);
        } catch (_) {
            window.location.href = 'login.html';
        }
    }
    document.addEventListener('DOMContentLoaded', ensureLoggedIn);
</script>
</body>
</html>
