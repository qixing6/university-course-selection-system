<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>选课/退课</title>
    <script src="https://cdn.bootcdn.net/ajax/libs/axios/0.27.2/axios.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: "Microsoft Yahei", sans-serif; }
        body { background: #f0f2f5; padding: 20px; }
        .container { max-width: 600px; margin: 0 auto; background: white; padding: 25px; border-radius: 12px; box-shadow: 0 2px 12px rgba(0,0,0,0.1); }
        h1 { color: #2c3e50; margin-bottom: 20px; }
        .back-btn { padding: 8px 16px; background: #909399; color: white; border: none; border-radius: 6px; cursor: pointer; margin-bottom: 20px; }
        .form-item { margin-bottom: 15px; }
        .form-item label { display: block; margin-bottom: 5px; color: #606266; }
        .form-item input { width: 100%; padding: 10px; border: 1px solid #dcdfe6; border-radius: 6px; }
        .btn-group { display: flex; gap: 10px; margin-top: 20px; }
        button { padding: 12px 24px; border: none; border-radius: 6px; cursor: pointer; transition: all 0.3s; font-size: 16px; }
        .btn-select { background: #409eff; color: white; }
        .btn-drop { background: #f56c6c; color: white; }
        button:hover { transform: translateY(-1px); }
    </style>
</head>
<body>
<div class="container">
    <h1>🎯 选课/退课</h1>
    <button class="back-btn" onclick="location.href='course.html'">← 返回首页</button>

    <div class="form-item">
        <label>学生ID：</label>
        <input type="number" id="studentId" placeholder="请输入学生ID">
    </div>
    <div class="form-item">
        <label>课程ID：</label>
        <input type="number" id="courseId" placeholder="请输入课程ID">
    </div>

    <div class="btn-group">
        <button class="btn-select" onclick="selectCourse()">选课</button>
        <button class="btn-drop" onclick="dropCourse()">退课</button>
    </div>
</div>

<script>
    const baseURL = window.location.protocol + '//' + window.location.host + '/api';
    // 选课
    async function selectCourse() {
        const studentId = document.getElementById('studentId').value;
        const courseId = document.getElementById('courseId').value;
        if (!studentId || !courseId) { alert('请输入学生ID和课程ID'); return; }
        try {
            await axios.post(`${baseURL}/selection/select`, { studentId, courseId });
            alert('选课成功！');
        } catch (e) {
            alert('选课失败：' + (e.response?.data?.msg || e.message));
        }
    }
    // 退课
    async function dropCourse() {
        const studentId = document.getElementById('studentId').value;
        const courseId = document.getElementById('courseId').value;
        if (!studentId || !courseId) { alert('请输入学生ID和课程ID'); return; }
        try {
            await axios.post(`${baseURL}/selection/drop`, { studentId, courseId });
            alert('退课成功！');
        } catch (e) {
            alert('退课失败：' + (e.response?.data?.msg || e.message));
        }
    }
</script>
</body>
</html>
